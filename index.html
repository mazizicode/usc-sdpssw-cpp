<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',Arial,sans-serif;background:#faf8f5;color:#222;font-size:17px;line-height:1.55}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px;padding:9px 12px;border:1px solid #d5cfc6;border-radius:8px;width:100%;background:#fff;color:#222}
input:focus,select:focus,textarea:focus{outline:2px solid #990000;outline-offset:1px;border-color:#990000}
textarea{resize:vertical;min-height:90px}
.btn{padding:12px 26px;border-radius:9px;border:none;font-weight:600;font-size:16px;transition:all .15s}
.btn-primary{background:#990000;color:#fff}
.btn-primary:hover{background:#7a0000}
.btn-secondary{background:#fff;color:#990000;border:1.5px solid #990000}
.btn-secondary:hover{background:#fdf2f2}
.btn-ghost{background:transparent;color:#555;border:1px solid #ccc}
.btn-ghost:hover{background:#f0ede8}
.btn-gold{background:#FFCC00;color:#3a2f00}
.btn-gold:hover{background:#eebf00}
.btn:disabled{opacity:.45;cursor:not-allowed}
.card{background:#fff;border:1px solid #e8e2d9;border-radius:14px;padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.lbl{display:block;font-weight:600;font-size:15px;color:#444;margin:14px 0 5px}
.lbl .req{color:#990000}
.hint{font-size:13.5px;color:#888;margin-top:3px}
.badge{display:inline-block;padding:3px 11px;border-radius:99px;font-size:11.5px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
.tbl{width:100%;border-collapse:collapse;font-size:15px}
.tbl th{text-align:left;padding:10px 12px;background:#990000;color:#fff;font-weight:600;font-size:12px;letter-spacing:.4px;text-transform:uppercase}
.tbl th:first-child{border-radius:8px 0 0 0}.tbl th:last-child{border-radius:0 8px 0 0}
.tbl td{padding:11px 12px;border-bottom:1px solid #eee8df;vertical-align:top}
.tbl tr:hover td{background:#fdfaf4}
.tbl tr{cursor:pointer}
.chip{display:inline-block;background:#f3efe8;border:1px solid #e2dbcf;border-radius:8px;padding:2px 9px;font-size:12px;margin:2px 3px 2px 0}
.stat{background:#fff;border:1px solid #e8e2d9;border-radius:14px;padding:16px 20px;flex:1;min-width:130px}
.stat .n{font-size:30px;font-weight:900;color:#990000;line-height:1.1}
.stat .t{font-size:12px;color:#777;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.steps{display:flex;gap:0;margin-bottom:26px}
.step{flex:1;text-align:center;position:relative;padding-top:34px;font-size:14px;font-weight:600;color:#aaa}
.step::before{content:attr(data-n);position:absolute;top:0;left:50%;transform:translateX(-50%);width:26px;height:26px;border-radius:50%;background:#e8e2d9;color:#888;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.step::after{content:"";position:absolute;top:13px;left:calc(50% + 16px);width:calc(100% - 32px);height:2px;background:#e8e2d9}
.step:last-child::after{display:none}
.step.active{color:#990000}
.step.active::before{background:#990000;color:#fff}
.step.done{color:#2e7d32}
.step.done::before{background:#2e7d32;color:#fff;content:"\2713"}
.route-box{border-radius:12px;padding:16px 18px;margin:12px 0;border-left:5px solid}
.route-yes{background:#fdf3f3;border-color:#990000}
.route-no{background:#f1f8f1;border-color:#2e7d32}
.route-maybe{background:#fff8e6;border-color:#e6a700}
.modal-bg{position:fixed;inset:0;background:rgba(30,20,10,.45);display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;z-index:50}
.modal{background:#fff;border-radius:16px;max-width:860px;width:100%;padding:28px;position:relative;margin-bottom:40px}
.xclose{position:absolute;top:14px;right:16px;background:none;border:none;font-size:24px;color:#999;line-height:1}
.checkrow{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px}
.checkrow:hover{background:#faf6ef}
.checkrow input{width:18px;height:18px;accent-color:#990000;flex:none}
.tabbar{display:flex;gap:6px;border-bottom:2px solid #eee5d8;margin-bottom:18px}
.tab{padding:9px 18px;border:none;background:none;font-weight:700;font-size:14px;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab.on{color:#990000;border-bottom-color:#990000}
.demo-banner{background:#FFCC00;color:#3a2f00;text-align:center;font-size:15px;font-weight:700;padding:7px 14px}
.cmt{background:#faf7f1;border:1px solid #ece4d6;border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:15px}
.cmt .who{font-weight:700;color:#990000;font-size:12.5px}
.cmt .when{color:#999;font-size:11.5px;margin-left:8px;font-weight:400}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.filters select,.filters input{width:auto;min-width:170px;padding:9px 12px;font-size:15px}
@media print{.no-print{display:none!important}body{background:#fff}.card{border:none;box-shadow:none}}
@media (max-width:720px){.steps{flex-wrap:wrap}.step{min-width:33%}}

<script>
/* ============================================================
   USC SDPSSW Curriculum Change Proposal Portal
   Single-file React app (no build step). Firebase optional.
   ============================================================ */
var h = React.createElement;

/* ---------- CONFIGURATION (EDIT THESE) ---------- */
var FIREBASE_CONFIG = {
  apiKey: "PASTE_YOUR_API_KEY",
  authDomain: "PASTE.firebaseapp.com",
  projectId: "PASTE_PROJECT_ID",
  storageBucket: "PASTE.firebasestorage.app",
  messagingSenderId: "PASTE",
  appId: "PASTE"
};
var ADMIN_EMAILS = ["mirwaisa@usc.edu", "singhm@usc.edu"]; // Academic Affairs admins
var ALLOWED_DOMAIN = "usc.edu"; // only USC Google accounts may sign in
var DEFAULT_YEAR = "2026-27";
function nextYear(y){ var a = parseInt(y.slice(0,4),10)+1; return a + "-" + String(a+1).slice(2); }

var DEMO_MODE = FIREBASE_CONFIG.apiKey.indexOf("PASTE") === 0;

/* ---------- CONSTANTS ---------- */
var PROGRAMS = ["BSW","MSW","DSW","DSI","Multiple Programs","Other"];
var ROLES = ["Course Lead","Co-Lead","Curriculum Director","Program Director","Faculty","Other"];
var PROPOSAL_TYPES = ["Course","Certificate","Degree Program","Track / Specialization","Catalogue Description","Other"];
var CHANGE_TYPES = ["New","Revision","No Change This Year"];
var SCOPES = ["Minor","Major","Mixed (Minor + Major elements)"];
var SEMESTERS = ["Summer 2026","Fall 2026","Spring 2027","Summer 2027","Fall 2027","Spring 2028","TBD"];
var STATUSES = [
  {id:"draft",        label:"Draft",                color:"#777",    bg:"#eee"},
  {id:"submitted",    label:"Submitted",            color:"#0d47a1", bg:"#e3edfb"},
  {id:"aa_review",    label:"Academic Affairs Review", color:"#6a1b9a", bg:"#f1e6f7"},
  {id:"returned",     label:"Returned for Revision",color:"#b35a00", bg:"#fdeede"},
  {id:"curric_council",label:"Curriculum Council",  color:"#00695c", bg:"#e0f2f0"},
  {id:"university_review",label:"University Review (UCOC)", color:"#283593", bg:"#e8eaf6"},
  {id:"approved",     label:"Approved",             color:"#2e7d32", bg:"#e7f3e7"},
  {id:"in_production",label:"In Async Production",  color:"#8a6d00", bg:"#fff4cc"},
  {id:"implemented",  label:"Implemented",          color:"#1b5e20", bg:"#dcedc8"},
  {id:"withdrawn",    label:"Withdrawn",            color:"#888",    bg:"#f0f0f0"}
];
var PRODUCTION_STEPS = [
  {id:"syllabus", label:"Syllabus Finalized"},
  {id:"cdm",      label:"CDM Completed"},
  {id:"mod1_4",   label:"Async Modules 1\u20134 Developed"},
  {id:"mod5_9",   label:"Async Modules 5\u20139 Developed"},
  {id:"mod10_15", label:"Async Modules 10\u201315 Developed"},
  {id:"qa",       label:"QA Review"},
  {id:"finalrev", label:"Final Revisions"},
  {id:"signoff",  label:"Final Sign-Off"}
];
function statusOf(id){ for(var i=0;i<STATUSES.length;i++){if(STATUSES[i].id===id)return STATUSES[i];} return STATUSES[0]; }

/* ---------- SMART REVIEW-PATH ENGINE ----------
   Computes a recommended governance route from proposal answers.
   Grounded in USC ARR / UCOC process: new programs & certificates and
   substantive course changes require university-level (UCOC subcommittee)
   review via Curriculog; minor syllabus-level updates stay at school level. */
function computeRoute(p){
  var out = {council:"no", university:"no", notes:[]};
  var isNew = p.changeType === "New";
  var isCourse = p.proposalType === "Course";
  var isProgramish = p.proposalType === "Certificate" || p.proposalType === "Degree Program" || p.proposalType === "Track / Specialization";
  var major = (p.revisionScope||"").indexOf("Major") === 0 || (p.revisionScope||"").indexOf("Mixed") === 0;

  if (isNew && isProgramish){
    out.council = "yes"; out.university = "yes";
    out.notes.push("New certificates and programs require school Curriculum Council endorsement and university-level (UCOC subcommittee) approval via Curriculog.");
    out.notes.push("A New Program Brief must be approved in Curriculog before the full proposal is submitted (degree programs and certificates).");
    out.notes.push("If the program is more than 50% online, WSCUC approval is also required after UCOC approval and before any advertisement.");
  } else if (isNew && isCourse){
    out.council = "yes"; out.university = "yes";
    out.notes.push("New courses go through the school Curriculum Council, then UCOC subcommittee review via Curriculog. A syllabus meeting UCOC Required Syllabus Elements must be attached.");
  } else if (!isNew && isProgramish){
    out.council = "yes";
    out.university = major ? "yes" : "review";
    out.notes.push("Program/certificate revisions need Curriculum Council review. Changes to required courses, units, or titles listed in the USC Catalogue also require submission through Curriculog.");
  } else if (!isNew && isCourse && major){
    out.council = "yes"; out.university = "review";
    out.notes.push("Major course revisions need Curriculum Council review. University (UCOC) submission is required if the course number, title, units, prerequisites, grading basis, or catalogue description change.");
  } else if (!isNew && isCourse && !major){
    out.council = "no"; out.university = "no";
    out.notes.push("Minor syllabus-level revisions (readings, unit order, assignment weights) typically remain at the school level and do not require Curriculum Council or UCOC review.");
    out.notes.push("If the catalogue description, title, units, or prerequisites change, the proposal must still go through Curriculog \u2014 flag this in your description.");
  } else if (p.proposalType === "Catalogue Description"){
    out.council = "review"; out.university = "yes";
    out.notes.push("Catalogue description changes are processed through the Curriculum Coordination Office via Curriculog.");
  } else {
    out.council = "review"; out.university = "review";
    out.notes.push("Academic Affairs will confirm the review path for this proposal type.");
  }
  if (p.asyncUpdate === "Yes"){
    out.notes.push("Async (VAC) production will be coordinated by Academic Affairs instructional design. A Course Design Map (CDM) is the first production step.");
  }
  return out;
}

/* ---------- DEMO SEED DATA (drawn from AY 2025-26 intake sheet) ---------- */
function seedData(){
  var now = Date.now();
  function mk(i, o){
    return Object.assign({
      id:"demo"+i, academicYear:DEFAULT_YEAR, createdAt: now - i*86400000, updatedAt: now - i*43200000,
      submitterName:"", submitterEmail:"", role:"Course Lead", program:"MSW",
      proposalType:"Course", changeType:"Revision", revisionScope:"Minor",
      proposedTitle:"", courseNumber:"", courseTitle:"",
      asyncUpdate:"No", asyncSemester:"", asyncDescription:"", asyncSupport:"",
      description:"", rationale:"", status:"submitted",
      production:{}, comments:[]
    }, o);
  }
  return [
    mk(1,{submitterName:"Juan Araque", submitterEmail:"araque@usc.edu", program:"DSW", courseNumber:"SOWK 713", courseTitle:"Research Methods for Intervention Design and Evaluation", revisionScope:"Major", asyncUpdate:"Yes", asyncSemester:"Fall 2026", description:"Course content will change from implementation science to research methods and applied research content.", asyncDescription:"Complete redo. Need to develop 40\u201350 minutes of content for all 15 modules this summer to be ready in the fall.", status:"aa_review", rationale:"Aligns course with revised DSW research sequence."}),
    mk(2,{submitterName:"Sam Mistrano", submitterEmail:"mistrano@usc.edu", program:"MSW", courseNumber:"SOWK 536", courseTitle:"Policy and Advocacy in Professional Social Work", revisionScope:"Minor", asyncUpdate:"Yes", asyncSemester:"Fall 2026", description:"No syllabus changes needed.", asyncDescription:"Update a few video lectures; underlying content the same but supporting data/evidence to be refreshed (e.g., recent TANF data). Lectures are 5\u20137 minutes and set up subsequent Q&As.", status:"in_production", production:{syllabus:true,cdm:true}, rationale:"Data in current lectures is roughly ten years old."}),
    mk(3,{submitterName:"Shelly Zappas", submitterEmail:"zappas@usc.edu", program:"Other", proposalType:"Certificate", changeType:"New", revisionScope:"", proposedTitle:"Certificate in Advanced Foundational Nursing Sciences", description:"Designed for RNs planning to pursue MSN/DNP and NP licensure, or NPs refreshing foundational knowledge, through NURS 501, NURS 504, and NURS 502.", status:"university_review", rationale:"Builds clinical science competencies for advanced nursing practice."}),
    mk(4,{submitterName:"Dawn Joosten-Hagye", submitterEmail:"joosten@usc.edu", program:"MSW", courseNumber:"SOWK 525", courseTitle:"Foundations of Integrative Social Work Practice II", revisionScope:"Mixed (Minor + Major elements)", asyncUpdate:"Yes", asyncSemester:"Fall 2027", description:"Add interprofessional collaboration assignment (5%); re-order units; add evaluation of practice across six units; add two new units; remove two units; move case management to SOWK 523; divide CBT into individual and family units.", asyncDescription:"VAC updates are major; several segments require re-filming.", status:"submitted", rationale:"Strengthens integrated practice/evaluation threading across the course."}),
    mk(5,{submitterName:"Sara Schwartz", submitterEmail:"sschwartz@usc.edu", program:"MSW", proposalType:"Certificate", changeType:"New", proposedTitle:"Community Organizing for Justice and Empowerment", description:"New certificate on principles and history of community organizing, mezzo/macro organizing types, social action case studies, and policy advocacy. Will develop a new aligned course.", status:"submitted", rationale:"Fills a macro-practice gap in certificate offerings."}),
    mk(6,{submitterName:"Jennifer Lewis", submitterEmail:"jllewis@usc.edu", program:"MSW", proposalType:"Track / Specialization", changeType:"Revision", revisionScope:"Minor", description:"Track course name changes for consistency, e.g., SOWK 614 to \"Advanced Engagement and Assessment in School Settings\"; SOWK 643 to \"Advanced Engagement and Assessment in Health and Mental Health\".", status:"curric_council", rationale:"Aligns competencies and naming consistency across tracks."})
  ];
}
/* ---------- DATA LAYER (Firestore or in-memory demo) ---------- */
var DB = (function(){
  if (DEMO_MODE){
    var rows = seedData();
    var listeners = [];
    var cfg = {years:[DEFAULT_YEAR], activeYear:DEFAULT_YEAR};
    var cfgListeners = [];
    function notify(){ listeners.forEach(function(fn){ fn(rows.slice()); }); }
    return {
      demo:true,
      subscribeConfig:function(fn){ cfgListeners.push(fn); fn(Object.assign({},cfg)); return function(){ cfgListeners = cfgListeners.filter(function(x){return x!==fn;}); }; },
      saveConfig:function(c){ cfg = Object.assign({},c); cfgListeners.forEach(function(fn){ fn(Object.assign({},cfg)); }); return Promise.resolve(); },
      subscribe:function(fn){ listeners.push(fn); fn(rows.slice()); return function(){ listeners = listeners.filter(function(x){return x!==fn;}); }; },
      save:function(p){
        if(!p.id){ p.id = "p" + Date.now() + Math.floor(Math.random()*1000); p.createdAt = Date.now(); }
        p.updatedAt = Date.now();
        var ix = rows.findIndex(function(r){ return r.id === p.id; });
        if (ix >= 0) rows[ix] = p; else rows.unshift(p);
        notify();
        return Promise.resolve(p.id);
      },
      remove:function(id){ rows = rows.filter(function(r){ return r.id !== id; }); notify(); return Promise.resolve(); }
    };
  }
  firebase.initializeApp(FIREBASE_CONFIG);
  var fs = firebase.firestore();
  var col = fs.collection("proposals");
  return {
    demo:false,
    subscribeConfig:function(fn){
      return fs.collection("config").doc("app").onSnapshot(function(doc){
        var d = doc.exists ? doc.data() : null;
        fn(d && d.years && d.years.length ? d : {years:[DEFAULT_YEAR], activeYear:DEFAULT_YEAR});
      }, function(err){ console.error(err); fn({years:[DEFAULT_YEAR], activeYear:DEFAULT_YEAR}); });
    },
    saveConfig:function(c){ return fs.collection("config").doc("app").set(c); },
    subscribe:function(fn){
      return col.orderBy("updatedAt","desc").onSnapshot(function(snap){
        var rows = [];
        snap.forEach(function(d){ var o = d.data(); o.id = d.id; rows.push(o); });
        fn(rows);
      }, function(err){ console.error(err); fn([]); });
    },
    save:function(p){
      p.updatedAt = Date.now();
      if (p.id){ var id = p.id; var copy = Object.assign({}, p); delete copy.id; return col.doc(id).set(copy).then(function(){ return id; }); }
      p.createdAt = Date.now();
      return col.add(p).then(function(ref){ return ref.id; });
    },
    remove:function(id){ return col.doc(id).delete(); }
  };
})();

function isAdmin(user){ return !!user && ADMIN_EMAILS.indexOf((user.email||"").toLowerCase()) >= 0; }
function fmtDate(ts){ if(!ts) return ""; var d = new Date(ts); return (d.getMonth()+1)+"/"+d.getDate()+"/"+d.getFullYear(); }
function esc(s){ return (s==null?"":String(s)); }

/* ---------- CSV EXPORT (matches Academic Affairs intake columns) ---------- */
function exportCSV(rows, label){
  var head = ["Academic Year","Name","Email","Role","Program","Proposal Type","Course Number","Course/Proposal Title","New or Revision","If Revision: Minor or Major","If New: Proposed Title","Async Update?","Async Target Semester","Curric Council Review?","University Review?","Status","Description of Proposal/Revisions","Description of Async Changes & Support Needed","Rationale","Submitted","Last Updated"];
  function q(v){ v = esc(v).replace(/"/g,'""'); return '"'+v+'"'; }
  var lines = [head.map(q).join(",")];
  rows.forEach(function(p){
    var r = computeRoute(p);
    function yn(v){ return v==="yes"?"Yes":(v==="no"?"No":"AA to confirm"); }
    lines.push([p.academicYear,p.submitterName,p.submitterEmail,p.role,p.program,p.proposalType,p.courseNumber,p.courseTitle||p.proposedTitle,p.changeType,p.revisionScope,p.proposedTitle,p.asyncUpdate,p.asyncSemester,yn(r.council),yn(r.university),statusOf(p.status).label,p.description,(esc(p.asyncDescription)+(p.asyncSupport?" | Support: "+p.asyncSupport:"")),p.rationale,fmtDate(p.createdAt),fmtDate(p.updatedAt)].map(q).join(","));
  });
  var blob = new Blob(["\uFEFF"+lines.join("\r\n")], {type:"text/csv;charset=utf-8"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "SDPSSW_Curriculum_Proposals_"+(label||"All_Years").replace(/[^0-9A-Za-z_-]/g,"-")+".csv";
  a.click();
}

/* ---------- PRINT VIEW ---------- */
function printProposal(p){
  var r = computeRoute(p);
  function yn(v){ return v==="yes"?"Yes":(v==="no"?"No":"To be confirmed by Academic Affairs"); }
  function row(k,v){ return v ? "<tr><td style='font-weight:600;padding:6px 10px;border:1px solid #ddd;width:220px;vertical-align:top'>"+k+"</td><td style='padding:6px 10px;border:1px solid #ddd;white-space:pre-wrap'>"+esc(v)+"</td></tr>" : ""; }
  var w = window.open("","_blank","width=900,height=700");
  w.document.write("<html><head><title>Curriculum Proposal \u2014 "+esc(p.courseNumber||p.proposedTitle||p.proposalType)+"</title>"+
    "<style>body{font-family:Arial,sans-serif;color:#222;padding:30px;font-size:13px}h1{color:#990000;font-size:20px;margin-bottom:2px}h2{font-size:13px;color:#666;font-weight:400;margin-bottom:18px}table{border-collapse:collapse;width:100%}</style></head><body>"+
    "<h1>USC Suzanne Dworak-Peck School of Social Work</h1><h2>Academic Affairs \u2014 Curriculum Change Proposal \u2022 AY "+esc(p.academicYear)+"</h2><table>"+
    row("Status", statusOf(p.status).label)+
    row("Submitted by", esc(p.submitterName)+" ("+esc(p.submitterEmail)+")")+
    row("Role", p.role)+ row("Program", p.program)+ row("Proposal type", p.proposalType)+
    row("Course", (esc(p.courseNumber)+" "+esc(p.courseTitle)).trim())+
    row("New or revision", p.changeType)+ row("Revision scope", p.revisionScope)+
    row("Proposed title (if new)", p.proposedTitle)+
    row("Description of proposal / revisions", p.description)+
    row("Rationale", p.rationale)+
    row("Async update needed", p.asyncUpdate)+ row("Async target semester", p.asyncSemester)+
    row("Async changes & support needed", esc(p.asyncDescription)+(p.asyncSupport?"\nSupport: "+esc(p.asyncSupport):""))+
    row("Curriculum Council review", yn(r.council))+
    row("University (UCOC) review", yn(r.university))+
    row("Routing notes", r.notes.join("\n\u2022 "))+
    row("Submitted on", fmtDate(p.createdAt))+ row("Last updated", fmtDate(p.updatedAt))+
    "</table><p style='margin-top:24px;color:#888;font-size:11px'>Generated by the SDPSSW Curriculum Change Proposal Portal. University-level submissions are processed through Curriculog by the Curriculum Coordination Office.</p>"+
    "<script>window.print()<\/script></body></html>");
  w.document.close();
}
/* ---------- SMALL COMPONENTS ---------- */
function Badge(props){
  var s = statusOf(props.status);
  return h("span",{className:"badge",style:{color:s.color,background:s.bg}}, s.label);
}
function Field(props){
  return h("div",null,
    h("label",{className:"lbl"}, props.label, props.required ? h("span",{className:"req"}," *") : null),
    props.children,
    props.hint ? h("div",{className:"hint"}, props.hint) : null
  );
}
function Sel(props){
  return h("select",{value:props.value||"",onChange:function(e){props.onChange(e.target.value);}},
    h("option",{value:""},"\u2014 Select \u2014"),
    props.options.map(function(o){ return h("option",{key:o,value:o},o); })
  );
}
function RouteBox(props){
  var cls = props.v==="yes" ? "route-yes" : (props.v==="no" ? "route-no" : "route-maybe");
  var word = props.v==="yes" ? "Yes \u2014 required" : (props.v==="no" ? "Not required" : "Academic Affairs will confirm");
  return h("div",{className:"route-box "+cls},
    h("div",{style:{fontWeight:800,fontSize:13.5}}, props.title),
    h("div",{style:{fontSize:14,marginTop:2}}, word)
  );
}

/* ---------- LOGIN ---------- */
function LoginScreen(props){
  function doLogin(){
    if (DEMO_MODE){
      var name = prompt("Preview mode \u2014 enter a name to sign in as:","Mirwais Azizi");
      if(!name) return;
      var email = prompt("Enter a USC email (use mirwaisa@usc.edu to preview the admin view):","mirwaisa@usc.edu");

  var isCourse = p.proposalType==="Course";
  var isNew = p.changeType==="New";
  var isRev = p.changeType==="Revision";

  var stepNames = ["Who & What","Change Details","Async Production","Review & Submit"];
  function valid(i){

        h(Field,{label:"Current course title"}, h("input",{value:p.courseTitle,onChange:function(e){up("courseTitle",e.target.value);}}))
      ) : null,

        h("div",{style:{display:"flex",gap:10}},

      h("div",{style:{fontSize:13.5}},"Start a new proposal \u2014 it takes about five minutes and saves as a draft at any point.")
    ) : h("div",{className:"card",style:{padding:0,overflow:"auto"}},
      h("table",{className:"tbl"},
        h("thead",null,h("tr",null,
          h("th",null,"Course / Proposal"), h("th",null,"Program"), h("th",null,"Type"),
          h("th",null,"Change"), admin?h("th",null,"Submitter"):null, h("th",null,"Year"), h("th",null,"Async"),
          h("th",null,"Status"), h("th",null,"Updated"))),
        h("tbody",null, visible.map(function(r){
          var prod = r.production||{}; var pd = PRODUCTION_STEPS.filter(function(s){return prod[s.id];}).length;
          return h("tr",{key:r.id,onClick:function(){setDet(r.id);}},
            h("td",{style:{fontWeight:600}}, (r.courseNumber? r.courseNumber+" ":"")+(r.courseTitle||r.proposedTitle||r.proposalType)),
            h("td",null,r.program),
            h("td",null,r.proposalType),
            h("td",null, r.changeType + (r.revisionScope? " \u00B7 "+r.revisionScope.split(" ")[0]:"")),
            admin?h("td",null,r.submitterName):null,
            h("td",{style:{whiteSpace:"nowrap"}}, r.academicYear||DEFAULT_YEAR),
            h("td",null, r.asyncUpdate==="Yes" ? (pd>0 ? pd+"/"+PRODUCTION_STEPS.length : "Yes") : (r.asyncUpdate||"\u2014")),
            h("td",null,h(Badge,{status:r.status})),
            h("td",{style:{color:"#999",fontSize:12.5}},fmtDate(r.updatedAt))
          );
        }))
      )
    ),

    wiz ? h(Wizard,{initial:wiz,onClose:function(){setWiz(null);},onDone:function(status){
      setWiz(null);
      if(status==="submitted") alert("Proposal submitted. Academic Affairs has been notified on their dashboard and will confirm the review path.");
    }}) : null,
    detLive ? h(Detail,{proposal:detLive,user:user,onClose:function(){setDet(null);},onEdit:function(p){setDet(null);setWiz(p);}}) : null
  );
}

/* ---------- APP ROOT ---------- */
function App(){
  var uSt = React.useState(undefined); var user = uSt[0], setUser = uSt[1];
  React.useEffect(function(){
    if (DEMO_MODE){ setUser(null); return; }
    return firebase.auth().onAuthStateChanged(function(u){
      if (u && (u.email||"").toLowerCase().indexOf("@"+ALLOWED_DOMAIN) < 0){ firebase.auth().signOut(); setUser(null); return; }
      setUser(u||null);
    });
  },[]);
  if (user===undefined) return h("div",{style:{padding:60,textAlign:"center",color:"#999"}},"Loading\u2026");
  if (!user) return h("div",null, DEMO_MODE?h("div",{className:"demo-banner"},"PREVIEW MODE \u2014 You are viewing sample data. Nothing is saved yet."):null, h(LoginScreen,{onDemoLogin:setUser}));
  return h("div",null,
    DEMO_MODE?h("div",{className:"demo-banner"},"PREVIEW MODE \u2014 You are viewing sample data. Nothing is saved yet."):null,
    h(Header,{user:user,onLogout:function(){ if(DEMO_MODE){setUser(null);} else {firebase.auth().signOut();} }}),
    h(Dashboard,{user:user})
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));

</script>
</body>
</html>
